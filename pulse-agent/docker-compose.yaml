services:
  pulse-docker-agent:
    image: ghcr.io/rcourtman/pulse-docker-agent:latest
    container_name: pulse-docker-agent
    pid: host
    uts: host
    restart: unless-stopped
    environment:
      - PULSE_URL=${PULSE_URL}
      - PULSE_TOKEN=${PULSE_TOKEN} # http://localhost:7655
      - PULSE_TARGETS=${PULSE_TARGETS} # Only token
      - PULSE_NO_AUTO_UPDATE=true # http://localhost:7655|token
    volumes:
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      # Check if the agent process is running. Assumes the binary is named 'pulse-docker-agent'.
      test: ["CMD", "pgrep", "pulse-docker-agent"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s